default-channel = "all"

chat-cooldown-ms = 1000
spam-threshold = 5
spam-time-window-ms = 5000
private-message-expiry-minutes = 30
enable-channel-switch-tip = true
enable-chat-log = true

formats {
    all = "&7[{server}] &r{prefix}{player}&7: &f{message}"
    party = "&9[Party] &r{prefix}{player}&7: &b{message}"
    guild = "&2[Guild] &r{guild-tag} {prefix}{player}&7: &a{message}"
    officer = "&6[Officer] &r{guild-tag} {prefix}{player}&7: &e{message}"
    private-send = "&6To &e{receiver}&6: &f{message}"
    private-receive = "&6From &e{sender}&6: &f{message}"
}

permissions {
    channel-all = "chat.channel.all"
    channel-party = "chat.channel.party"
    channel-guild = "chat.channel.guild"
    channel-officer = "chat.channel.officer"
    command-chat = "chat.command.chat"
    command-msg = "chat.command.msg"
    command-reply = "chat.command.reply"
    bypass-cooldown = "chat.bypass.cooldown"
    bypass-spam = "chat.bypass.spam"
}

messages {
    prefix = "&a频道 &7» &r"

    help-header = "&a&m----------------&a 聊天频道帮助 &a&m----------------"
    help-chat = "&a/chat <频道> &7- 切换聊天频道 (a/all, p/party, g/guild, o/officer)"
    help-achat = "&a/achat <消息> &7- 强制发送到 All 频道"
    help-pchat = "&a/pchat <消息> &7- 强制发送到 Party 频道"
    help-gchat = "&a/gchat <消息> &7- 强制发送到 Guild 频道"
    help-ochat = "&a/ochat <消息> &7- 强制发送到 Officer 频道"
    help-msg = "&a/msg <玩家> <消息> &7- 发送私聊消息"
    help-reply = "&a/reply <消息> &7- 回复最后私聊的人"
    help-footer = "&a&m----------------------------------------"

    channel-switched = "&a你已将聊天频道切换至 {channel}&a。"
    channel-invalid = "&c无效的频道！可选: a/all, p/party, g/guild, o/officer"
    channel-no-permission = "&c你没有权限使用 {channel} &c频道！"
    channel-current = "&7你当前的聊天频道: {channel}"

    message-sent = ""
    message-empty = "&c消息不能为空！"

    party-not-in-party = "&c你当前不在任何队伍中！"
    guild-not-in-guild = "&c你当前不在任何公会中！"
    guild-no-officer = "&c你不是公会官员，无法使用官员频道！"

    msg-player-not-found = "&c找不到玩家 &e{player}&c！"
    msg-self = "&c你不能给自己发送私聊！"
    msg-sent = "&6To &e{receiver}&6: &f{message}"
    msg-received = "&6From &e{sender}&6: &f{message}"
    msg-no-reply = "&c你没有可以回复的私聊消息！"
    msg-reply-expired = "&c私聊记录已过期！"

    cooldown = "&c你发送消息太快了！请稍等 {time} &c秒。"
    spam-warning = "&c请勿刷屏！你的消息已被拦截。"

    no-permission = "&c你没有权限执行此命令！"
    player-only = "&c此命令只能由玩家执行！"
    usage = "&c用法: {usage}"
    error = "&c发生错误，请稍后再试。"
}
